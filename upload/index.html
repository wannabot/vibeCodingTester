<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고양이 버튼</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f2f2f2;
      font-family: Arial, "Malgun Gothic", sans-serif;
      color: #111;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .box {
      width: 100%;
      max-width: 720px;
      background: white;
      border: 5px solid #111;
      padding: 32px;
      box-shadow: 10px 10px 0 #111;
      text-align: center;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 64px;
      line-height: 1;
      letter-spacing: -2px;
    }

    .main-text {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 18px;
    }

    .sub-text {
      font-size: 20px;
      margin-bottom: 28px;
    }

    .line {
      height: 4px;
      background: #111;
      margin: 24px 0;
    }

    .btn {
      border: 4px solid #111;
      background: #fff;
      padding: 14px 22px;
      font-size: 22px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 6px 6px 0 #111;
    }

    .btn:active {
      transform: translate(4px, 4px);
      box-shadow: 2px 2px 0 #111;
    }

    .msg {
      margin-top: 28px;
      padding: 18px;
      border: 4px dashed #111;
      background: #efefef;
      font-size: 28px;
      font-weight: 900;
      min-height: 80px;
    }

    .footer {
      margin-top: 24px;
      font-size: 16px;
      font-weight: bold;
      color: #444;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 44px;
      }

      .main-text {
        font-size: 24px;
      }

      .sub-text {
        font-size: 16px;
      }

      .msg {
        font-size: 22px;
      }

      .btn {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="box">
      <h1>고양이 버튼</h1>
      <div class="main-text">클릭하면 랜덤 고양이 메시지가 나옵니다</div>
      <div class="sub-text">특별한 기능은 없고, 그냥 누르면 문구가 바뀝니다.</div>

      <div class="line"></div>

      <button class="btn" onclick="changeMessage()">눌러보기</button>

      <div class="msg" id="msgBox">고양이 발견</div>

      <div class="footer">made for cat</div>
    </div>
  </div>

  <script>
    const messages = [
      "고양이 발견",
      "고양이 접근 중",
      "고양이 모드 활성화",
      "고양이가 들어왔습니다",
      "여기는 고양이 구역",
      "고양이 확인 완료",
      "고양이 접속 성공",
      "반갑다 집사야",
      "냥냥 경보 발령",
      "고양이 에너지 충전 완료",
      "지금부터 냥타임",
      "고양이 기분 최고조",
      "집사 호출 중",
      "사료 레이더 가동",
      "캣닢 신호 감지",
      "고양이 집중 모드",
      "오늘도 냥승리",
      "졸음 80% 장전",
      "창밖 감시 시작",
      "폭신한 자리 확보",
      "냥펀치 준비 완료",
      "간식 요청 접수",
      "꼬리 흔들림 감지",
      "매우 귀여움 상태",
      "고양이 우선 모드"
    ];

    function changeMessage() {
      const msgBox = document.getElementById("msgBox");
      const randomIndex = Math.floor(Math.random() * messages.length);
      msgBox.textContent = messages[randomIndex];
    }
  </script>
</body>
</html>
