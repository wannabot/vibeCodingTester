<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cat Variables Atelier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Fraunces:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">GPT Image Cat Studio</p>
        <h1>고양이 변수마다<br />한 장의 무드를 붙인 작은 아틀리에</h1>
        <p class="hero-text">
          각 변수는 GPT 이미지 생성용 프롬프트와 함께 하나의 장면으로 구성됩니다.
          사랑스러운 성격표처럼 보고, 마음에 드는 무드 카드를 골라보세요.
        </p>
        <div class="hero-actions">
          <button class="primary-btn" id="shuffleButton" type="button">오늘의 최애 변수 뽑기</button>
          <p class="hero-note">랜덤 추천이 아래 스포트라이트와 카드 강조에 반영됩니다.</p>
        </div>
      </div>

      <section class="spotlight" aria-live="polite">
        <div class="spotlight-image-frame">
          <img id="spotlightImage" class="spotlight-image" src="" alt="" />
        </div>
        <div class="spotlight-copy">
          <p class="spotlight-label">Today&apos;s Cat Variable</p>
          <h2 id="spotlightName"></h2>
          <p id="spotlightValue" class="spotlight-value"></p>
          <p id="spotlightDescription" class="spotlight-description"></p>
          <div class="prompt-box">
            <span>GPT 이미지 프롬프트</span>
            <p id="spotlightPrompt"></p>
          </div>
        </div>
      </section>
    </header>

    <main>
      <section class="intro-strip">
        <p>캣타워, 햇살, 간식, 호기심. 고양이 애호가가 좋아할 디테일을 변수 단위로 큐레이션했습니다.</p>
      </section>

      <section class="gallery-section">
        <div class="section-head">
          <p class="eyebrow">Curated Gallery</p>
          <h2>고양이 변수 이미지 컬렉션</h2>
        </div>
        <div class="variable-grid" id="variableGrid"></div>
      </section>
    </main>
  </div>

  <template id="cardTemplate">
    <article class="cat-card">
      <div class="card-image-wrap">
        <img class="card-image" src="" alt="" />
      </div>
      <div class="card-body">
        <div class="card-header">
          <p class="card-kicker"></p>
          <h3 class="card-title"></h3>
        </div>
        <p class="card-value"></p>
        <p class="card-description"></p>
        <div class="card-prompt">
          <span>Prompt</span>
          <p></p>
        </div>
      </div>
    </article>
  </template>

  <script src="../script.js"></script>
</body>
</html>
